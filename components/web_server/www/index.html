<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ESPHome</title>
<style>
  :root {
  --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232736;
    --border: #2e3245;
    --accent: #5b6ef5;
    --accent-glow: #5b6ef530;
    --text: #e8eaf6;
    --text2: #8b90b8;
    --on: #4ade80;
    --off: #4b5280;
    --warn: #fb923c;
    --radius: 12px;
    --radius-sm: 8px;
    --transition: 0.18s ease;
  }
  
  *,
  *::before,
  *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  
  html, body {
    width: 100%;
  }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
  }
  
  /* ── Header ───────────────────────────────── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    width: 100%;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  
  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  
  .logo {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
  }
  
  .device-name {
    font-weight: 600;
    font-size: 16px;
  }
  
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--off);
  }
  
  .status-dot.connected {
    background: var(--on);
    box-shadow: 0 0 8px var(--on);
  }
  
  .uptime {
    color: var(--text2);
    font-size: 13px;
  }
  
  /* ── Tabs ───────────────────────────────── */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 12px 16px 0;
    border-bottom: 1px solid var(--border);
    width: 100%;
  }
  
  .tab {
    padding: 8px 14px;
    border-radius: var(--radius-sm) var(--radius-sm) 0 0;
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    font-size: 14px;
    white-space: nowrap;
    position: relative;
  }
  
  .tab.active {
    color: var(--text);
    background: var(--surface);
  }
  
  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--accent);
  }
  
  .tab-count {
    background: var(--border);
    border-radius: 99px;
    padding: 1px 6px;
    font-size: 11px;
    margin-left: 4px;
  }
  
  /* ── Layout ─────────────────────────────── */
  main {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
  }
  
  /* ── Grid ─────────────────────────────── */
  .grid,
  .grid-wide {
    display: grid;
    gap: 12px;
  }
  
  .grid {
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  }
  
  .grid-wide {
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  }
  
  /* ── Card ─────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  
  .card-header {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 12px;
  }
  
  .card-title {
    font-weight: 600;
    font-size: 14px;
  }
  
  .card-meta {
    color: var(--text2);
    font-size: 12px;
  }
  
  /* ── Toggle ───────────────────────────── */
  .toggle {
    position: relative;
    width: 44px;
    height: 24px;
  }
  
  .toggle input {
    display: none;
  }
  
  .toggle-track {
    position: absolute;
    inset: 0;
    background: var(--off);
    border-radius: 99px;
  }
  
  .toggle-track::after {
    content: '';
    position: absolute;
    top: 3px;
    left: 3px;
    width: 18px;
    height: 18px;
    background: #fff;
    border-radius: 50%;
    transition: transform var(--transition);
  }
  
  .toggle input:checked + .toggle-track {
    background: var(--accent);
  }
  
  .toggle input:checked + .toggle-track::after {
    transform: translateX(20px);
  }
  
  /* ── Sensor ───────────────────────────── */
  .sensor-value {
    font-size: 28px;
    font-weight: 600;
  }
  
  .sensor-unit {
    color: var(--text2);
    font-size: 14px;
  }
  
  /* ── Inputs ───────────────────────────── */
  input[type=range] {
    width: 100%;
  }
  
  select {
    width: 100%;
  }
  
  /* ── Misc ───────────────────────────── */
  .empty {
    text-align: center;
    padding: 40px;
    color: var(--text2);
  }
  
  /* ── Mobile ─────────────────────────── */
  @media (max-width: 480px) {
    main {
      padding: 12px;
    }
  
    .grid,
    .grid-wide {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <span>Connecting…</span>
</div>

<header>
  <div class="header-left">
    <svg class="logo" viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="13" stroke="#5b6ef5" stroke-width="2"/>
      <path d="M9 14l3 3 7-7" stroke="#5b6ef5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div>
      <div class="device-name" id="device-name">ESPHome</div>
    </div>
  </div>
  <div class="header-right">
    <span class="uptime" id="uptime-label"></span>
    <div class="status-dot" id="status-dot"></div>
  </div>
</header>

<nav class="tabs" id="tabs"></nav>

<main id="main">
  <div id="loader-inner" class="empty">Loading…</div>
</main>

<script>
'use strict';

// ── State ───────────────────────────────────────────────────────────────────
let state = {};
let activeTab = 'all';

// ── Uptime formatter ────────────────────────────────────────────────────────
function fmtUptime(s) {
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m ${sec}s`;
  return `${sec}s`;
}

// ── SSE connection ──────────────────────────────────────────────────────────
function connect() {
  const dot = document.getElementById('status-dot');
  const es = new EventSource('/events');

  es.addEventListener('full_state', e => {
    try {
      state = JSON.parse(e.data);
      dot.classList.add('connected');
      const name = state.friendly_name || state.device_name || 'ESPHome';
      document.getElementById('device-name').textContent = name;
      document.title = name;
      document.getElementById('loader').style.opacity = '0';
      setTimeout(() => document.getElementById('loader').remove(), 400);
      renderAll();
    } catch(err) { console.error('full_state parse error', err); }
  });

  es.addEventListener('state_change', e => {
    try {
      const entity = JSON.parse(e.data);
      mergeEntity(entity);
      updateCard(entity);
    } catch(err) { console.error('state_change parse error', err); }
  });

  es.onerror = () => { dot.classList.remove('connected'); };
}

function mergeEntity(entity) {
  const lists = ['switches','lights','sensors','binary_sensors','text_sensors',
                 'fans','climates','numbers','selects','buttons'];
  for (const key of lists) {
    if (!state[key]) continue;
    const idx = state[key].findIndex(e => e.id === entity.id);
    if (idx >= 0) { state[key][idx] = entity; return; }
  }
}

// ── Periodic uptime poll ────────────────────────────────────────────────────
setInterval(async () => {
  try {
    const r = await fetch('/api/state');
    const s = await r.json();
    if (s.uptime !== undefined) {
      document.getElementById('uptime-label').textContent = fmtUptime(s.uptime);
    }
  } catch {}
}, 10000);

// ── API helpers ─────────────────────────────────────────────────────────────
async function post(url, params = {}) {
  const fd = new FormData();
  for (const [k, v] of Object.entries(params)) fd.append(k, v);
  await fetch(url, { method: 'POST', body: fd });
}

// ── Render all sections ─────────────────────────────────────────────────────
function renderAll() {
  buildTabs();
  renderSection();
}

const SECTIONS = [
  { key: 'all',           label: 'All' },
  { key: 'switches',      label: 'Switches' },
  { key: 'lights',        label: 'Lights' },
  { key: 'sensors',       label: 'Sensors' },
  { key: 'binary_sensors',label: 'Binary' },
  { key: 'text_sensors',  label: 'Text' },
  { key: 'fans',          label: 'Fans' },
  { key: 'climates',      label: 'Climate' },
  { key: 'numbers',       label: 'Numbers' },
  { key: 'selects',       label: 'Selects' },
  { key: 'buttons',       label: 'Buttons' },
];

function buildTabs() {
  const nav = document.getElementById('tabs');
  nav.innerHTML = '';
  for (const s of SECTIONS) {
    const count = s.key === 'all' || s.key === 'ota'
      ? null
      : (state[s.key] || []).length;
    if (count === 0) continue;
    const btn = document.createElement('button');
    btn.className = 'tab' + (activeTab === s.key ? ' active' : '');
    btn.textContent = s.label;
    if (count != null) {
      const c = document.createElement('span');
      c.className = 'tab-count'; c.textContent = count;
      btn.appendChild(c);
    }
    btn.onclick = () => { activeTab = s.key; buildTabs(); renderSection(); };
    nav.appendChild(btn);
  }
}

function renderSection() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  const keys = activeTab === 'all'
    ? ['switches','lights','sensors','binary_sensors','text_sensors',
       'fans','climates','numbers','selects','buttons']
    : [activeTab];

  let any = false;
  for (const key of keys) {
    const items = state[key] || [];
    if (!items.length) continue;
    any = true;
    if (activeTab === 'all') {
      const h = document.createElement('h3');
      h.textContent = key.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
      h.style.cssText = 'margin:16px 0 8px;font-size:13px;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;';
      main.appendChild(h);
    }
    const grid = document.createElement('div');
    grid.className = ['climates','lights','numbers'].includes(key) ? 'grid-wide' : 'grid';
    for (const e of items) {
      const card = buildCard(key, e);
      if (card) grid.appendChild(card);
    }
    main.appendChild(grid);
  }
  if (!any) {
    const em = document.createElement('div'); em.className = 'empty';
    em.textContent = 'No entities in this section.';
    main.appendChild(em);
  }
}

// ── Card builders ───────────────────────────────────────────────────────────
function buildCard(type, e) {
  switch (type) {
    case 'switches':       return cardSwitch(e);
    case 'lights':         return cardLight(e);
    case 'sensors':        return cardSensor(e);
    case 'binary_sensors': return cardBinary(e);
    case 'text_sensors':   return cardText(e);
    case 'fans':           return cardFan(e);
    case 'climates':       return cardClimate(e);
    case 'numbers':        return cardNumber(e);
    case 'selects':        return cardSelect(e);
    case 'buttons':        return cardButton(e);
    default: return null;
  }
}

function card(id, inner) {
  const d = document.createElement('div');
  d.className = 'card'; d.id = 'card-' + id;
  d.innerHTML = inner; return d;
}

// Switch
function cardSwitch(e) {
  const c = card(e.id, `
    <div class="card-header">
      <div><div class="card-title">${esc(e.name)}</div>
           <div class="card-meta">switch</div></div>
      <label class="toggle">
        <input type="checkbox" ${e.state ? 'checked' : ''} onchange="post('/api/switch/${esc(e.id)}/toggle')">
        <div class="toggle-track"></div>
      </label>
    </div>`);
  return c;
}

// Light
function cardLight(e) {
  const rgb = e.r != null ? `rgb(${e.r},${e.g},${e.b})` : '#ffffff';
  const effects = (e.effects || []).filter(x => x && x !== 'None');
  const effectChips = effects.map(ef =>
    `<span class="effect-chip ${e.effect===ef?'active':''}"
      onclick="post('/api/light/${esc(e.id)}',{effect:'${esc(ef)}'})">${esc(ef)}</span>`
  ).join('');
  return card(e.id, `
    <div class="card-header">
      <div><div class="card-title">${esc(e.name)}</div>
           <div class="card-meta">light</div></div>
      <div style="display:flex;align-items:center;gap:8px;">
        ${e.r != null ? `<div class="light-color-preview" style="background:${rgb}"></div>` : ''}
        <label class="toggle">
          <input type="checkbox" ${e.state ? 'checked' : ''}
            onchange="post('/api/light/${esc(e.id)}',{state:this.checked?'on':'off'})">
          <div class="toggle-track"></div>
        </label>
      </div>
    </div>
    <div class="range-label"><span>Brightness</span><span id="bv-${esc(e.id)}">${e.brightness||0}</span></div>
    <input type="range" min="0" max="255" value="${e.brightness||0}"
      oninput="document.getElementById('bv-${esc(e.id)}').textContent=this.value"
      onchange="post('/api/light/${esc(e.id)}',{brightness:this.value})">
    ${e.min_mireds != null ? `
    <div class="range-label" style="margin-top:10px"><span>Color temp</span><span id="ct-${esc(e.id)}">${e.color_temp||e.min_mireds}</span></div>
    <input type="range" min="${e.min_mireds}" max="${e.max_mireds}" value="${e.color_temp||e.min_mireds}"
      oninput="document.getElementById('ct-${esc(e.id)}').textContent=this.value"
      onchange="post('/api/light/${esc(e.id)}',{color_temp:this.value})">` : ''}
    ${e.r != null ? `
    <div class="color-row" style="margin-top:10px">
      <span style="font-size:13px;color:var(--text2)">Color</span>
      <input type="color" value="${rgb2hex(e.r,e.g,e.b)}"
        onchange="sendRGB('${esc(e.id)}',this.value)">
    </div>` : ''}
    ${effectChips ? `<div class="effects-wrap">${effectChips}</div>` : ''}
  `);
}

function sendRGB(id, hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  post(`/api/light/${id}`, {r, g, b});
}
function rgb2hex(r,g,b) {
  return '#' + [r,g,b].map(v => (v||0).toString(16).padStart(2,'0')).join('');
}

// Sensor
function cardSensor(e) {
  const val = e.state != null
    ? `<span class="sensor-value sensor-ok">${typeof e.state === 'number' ? e.state.toFixed(1) : e.state}</span><span class="sensor-unit">${esc(e.unit||'')}</span>`
    : `<span class="sensor-value sensor-null">—</span>`;
  return card(e.id, `
    <div class="card-header">
      <div><div class="card-title">${esc(e.name)}</div>
           <div class="card-meta">${esc(e.device_class||'sensor')}</div></div>
    </div>
    <div style="margin-top:4px">${val}</div>`);
}

// Binary sensor
function cardBinary(e) {
  const pill = e.state
    ? `<span style="color:var(--on);font-weight:600">ON</span>`
    : `<span style="color:var(--text2)">OFF</span>`;
  return card(e.id, `
    <div class="card-header">
      <div><div class="card-title">${esc(e.name)}</div>
           <div class="card-meta">${esc(e.device_class||'binary sensor')}</div></div>
      ${pill}
    </div>`);
}

// Text sensor
function cardText(e) {
  return card(e.id, `
    <div class="card-header">
      <div><div class="card-title">${esc(e.name)}</div>
           <div class="card-meta">text sensor</div></div>
    </div>
    <div style="font-size:16px;font-weight:600;margin-top:4px;word-break:break-all">${esc(e.state||'—')}</div>`);
}

// Fan
function cardFan(e) {
  const speeds = e.speed_count || 0;
  return card(e.id, `
    <div class="card-header">
      <div><div class="card-title">${esc(e.name)}</div>
           <div class="card-meta">fan</div></div>
      <label class="toggle">
        <input type="checkbox" ${e.state ? 'checked' : ''}
          onchange="post('/api/fan/${esc(e.id)}',{state:this.checked?'on':'off'})">
        <div class="toggle-track"></div>
      </label>
    </div>
    ${speeds > 0 ? `
    <div class="range-label"><span>Speed</span><span id="fspd-${esc(e.id)}">${e.speed||1}</span></div>
    <input type="range" min="1" max="${speeds}" value="${e.speed||1}"
      oninput="document.getElementById('fspd-${esc(e.id)}').textContent=this.value"
      onchange="post('/api/fan/${esc(e.id)}',{speed:this.value})">` : ''}`);
}

// Climate
function cardClimate(e) {
  const modes = ['off','heat','cool','heat_cool','fan_only','dry','auto'];
  const modeButtons = modes.map(m =>
    `<button class="mode-btn ${e.mode===m?'active':''}"
      onclick="post('/api/climate/${esc(e.id)}',{mode:'${m}'})">${m}</button>`
  ).join('');
  return card(e.id, `
    <div class="card-header">
      <div><div class="card-title">${esc(e.name)}</div>
           <div class="card-meta">climate</div></div>
    </div>
    <div class="climate-temp">${e.current_temperature != null ? e.current_temperature.toFixed(1) + '°' : '—'}</div>
    <div class="climate-action">${esc(e.action||'')} · target ${e.target_temperature != null ? e.target_temperature.toFixed(1) + '°' : '—'}</div>
    <div class="range-label"><span>Set target</span><span id="ct2-${esc(e.id)}">${e.target_temperature||20}</span>°</div>
    <input type="range" min="10" max="35" step="0.5" value="${e.target_temperature||20}"
      oninput="document.getElementById('ct2-${esc(e.id)}').textContent=parseFloat(this.value).toFixed(1)"
      onchange="post('/api/climate/${esc(e.id)}',{target_temperature:this.value})">
    <div class="climate-modes" style="margin-top:12px">${modeButtons}</div>`);
}

// Number
function cardNumber(e) {
  const step = e.step || 1;
  return card(e.id, `
    <div class="card-header">
      <div><div class="card-title">${esc(e.name)}</div>
           <div class="card-meta">${esc(e.unit||'number')}</div></div>
    </div>
    <div class="number-control">
      <button class="num-btn" onclick="numStep('${esc(e.id)}',${-step},${e.min},${e.max})">−</button>
      <div class="num-val" id="nv-${esc(e.id)}">${e.state != null ? e.state : '—'}</div>
      <button class="num-btn" onclick="numStep('${esc(e.id)}',${step},${e.min},${e.max})">+</button>
    </div>
    <div style="margin-top:8px">
      <input type="range" min="${e.min}" max="${e.max}" step="${step}" value="${e.state||e.min}"
        oninput="document.getElementById('nv-${esc(e.id)}').textContent=this.value"
        onchange="post('/api/number/${esc(e.id)}',{value:this.value})">
    </div>`);
}

function numStep(id, delta, min, max) {
  const el = document.getElementById('nv-' + id);
  let v = parseFloat(el.textContent || min);
  v = Math.min(max, Math.max(min, v + delta));
  el.textContent = v;
  post(`/api/number/${id}`, {value: v});
}

// Select
function cardSelect(e) {
  const opts = (e.options || []).map(o =>
    `<option value="${esc(o)}" ${e.state===o?'selected':''}>${esc(o)}</option>`
  ).join('');
  return card(e.id, `
    <div class="card-header">
      <div><div class="card-title">${esc(e.name)}</div>
           <div class="card-meta">select</div></div>
    </div>
    <select onchange="post('/api/select/${esc(e.id)}',{option:this.value})">${opts}</select>`);
}

// Button
function cardButton(e) {
  return card(e.id, `
    <div class="card-header">
      <div><div class="card-title">${esc(e.name)}</div>
           <div class="card-meta">button</div></div>
    </div>
    <button class="btn" onclick="post('/api/button/${esc(e.id)}')">Press</button>`);
}

// ── OTA section ─────────────────────────────────────────────────────────────
function renderOTA(main) {
  const d = document.createElement('div');
  d.className = 'ota-card';
  d.innerHTML = `
    <div style="font-weight:600;font-size:16px;margin-bottom:4px">Over-the-air update</div>
    <div style="color:var(--text2);font-size:13px;margin-bottom:12px">Upload a compiled .bin firmware file</div>
    <div class="ota-drop" id="ota-drop" onclick="document.getElementById('ota-file').click()">
      <div style="font-size:28px;margin-bottom:8px">📦</div>
      <div>Drop .bin here or click to browse</div>
    </div>
    <input type="file" id="ota-file" accept=".bin" style="display:none" onchange="doOTA(this.files[0])">
    <progress id="ota-progress" value="0" max="100" style="display:none"></progress>
    <div id="ota-status" style="font-size:13px;color:var(--text2);margin-top:8px"></div>
  `;
  main.appendChild(d);

  const drop = d.querySelector('#ota-drop');
  drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag'); });
  drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
  drop.addEventListener('drop', e => {
    e.preventDefault(); drop.classList.remove('drag');
    if (e.dataTransfer.files[0]) doOTA(e.dataTransfer.files[0]);
  });
}

async function doOTA(file) {
  if (!file) return;
  const status = document.getElementById('ota-status');
  const progress = document.getElementById('ota-progress');
  progress.style.display = 'block';
  status.textContent = `Uploading ${file.name}…`;

  const xhr = new XMLHttpRequest();
  xhr.open('POST', '/api/ota');
  xhr.upload.onprogress = e => {
    if (e.lengthComputable) progress.value = (e.loaded / e.total * 100).toFixed(0);
  };
  xhr.onload = () => {
    if (xhr.status === 200) {
      status.textContent = 'OTA success — device rebooting…';
      status.style.color = 'var(--on)';
    } else {
      status.textContent = 'OTA failed: ' + xhr.responseText;
      status.style.color = 'var(--warn)';
    }
  };
  xhr.onerror = () => { status.textContent = 'Upload error'; status.style.color = 'var(--warn)'; };
  xhr.send(file);
}

// ── Live card patching (no full re-render on SSE update) ──────────────────
function updateCard(entity) {
  const typeMap = {
    switch: 'switches', light: 'lights', sensor: 'sensors',
    binary_sensor: 'binary_sensors', text_sensor: 'text_sensors',
    fan: 'fans', climate: 'climates', number: 'numbers',
    select: 'selects', button: 'buttons',
  };
  const existing = document.getElementById('card-' + entity.id);
  if (!existing) return;
  const type = typeMap[entity.type];
  if (!type) return;
  const newCard = buildCard(type, entity);
  if (newCard) existing.replaceWith(newCard);
}

// ── XSS escape ──────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Boot ─────────────────────────────────────────────────────────────────────
connect();
</script>
